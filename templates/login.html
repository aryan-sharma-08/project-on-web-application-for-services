<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — R.K. Studio</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <nav>
        <div class="nav-brand">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="R.K. Studio Logo" class="nav-logo">
        </div>
        <ul class="nav-links">
            <li><a href="/" data-en="Home" data-hi="होम">Home</a></li>
            <li><a href="/wedding" data-en="Wedding & Events" data-hi="शादी और इवेंट">Wedding & Events</a></li>
            <li><a href="/printing" data-en="Printing Services" data-hi="प्रिंटिंग सेवाएं">Printing Services</a></li>
            <li><a href="/gallery" data-en="Gallery" data-hi="गैलरी">Gallery</a></li>
            <li><a href="/contact" data-en="Contact Us" data-hi="संपर्क करें">Contact Us</a></li>
        </ul>
        <div class="lang-toggle">
            <button onclick="setLang('en')" id="btn-en" class="lang-btn active">EN</button>
            <span>|</span>
            <button onclick="setLang('hi')" id="btn-hi" class="lang-btn">हिं</button>
        </div>
    </nav>

    <header>
        <h1 data-en="🔐 Welcome Back!" data-hi="🔐 वापस आपका स्वागत है!">🔐 Welcome Back!</h1>
        <p data-en="Login to your R.K. Studio account" data-hi="अपने आर.के. स्टूडियो अकाउंट में लॉगिन करें">Login to your R.K. Studio account</p>
    </header>

    <main>
        <div class="auth-wrapper">
            <div class="auth-card">

                <div class="auth-icon">🔐</div>
                <h2 data-en="Login" data-hi="लॉगिन">Login</h2>

                {% if error %}
                <div class="error-message">❌ {{ error }}</div>
                {% endif %}

                <form action="/login" method="POST">
                    <div class="form-group">
                        <label data-en="📧 Email Address" data-hi="📧 ईमेल पता">📧 Email Address</label>
                        <input type="email" name="email" placeholder="Enter your email" required>
                    </div>
                    <div class="form-group">
                        <label data-en="🔒 Password" data-hi="🔒 पासवर्ड">🔒 Password</label>
                        <input type="password" name="password" placeholder="Enter your password" required>
                    </div>
                    <button type="submit" class="btn-submit" data-en="Login →" data-hi="लॉगिन करें →">Login →</button>
                </form>

                <p class="auth-switch">
                    <span data-en="Don't have an account?" data-hi="अकाउंट नहीं है?">Don't have an account?</span>
                    <a href="/register" data-en="Register here" data-hi="यहाँ रजिस्टर करें">Register here</a>
                </p>

            </div>
        </div>
    </main>

    <footer>
        <p data-en="© 2025 R.K. Studio. All rights reserved." data-hi="© 2025 आर.के. स्टूडियो। सर्वाधिकार सुरक्षित।">© 2025 R.K. Studio. All rights reserved.</p>
    </footer>

    <script>
        function setLang(lang) {
            localStorage.setItem('rk_lang', lang);
            applyLang(lang);
        }

        function applyLang(lang) {
            document.querySelectorAll('[data-en]').forEach(el => {
                el.textContent = lang === 'hi' ? el.getAttribute('data-hi') : el.getAttribute('data-en');
            });
            document.getElementById('btn-en').classList.toggle('active', lang === 'en');
            document.getElementById('btn-hi').classList.toggle('active', lang === 'hi');
        }

        const savedLang = localStorage.getItem('rk_lang') || 'en';
        applyLang(savedLang);
    </script>

</body>
</html>
